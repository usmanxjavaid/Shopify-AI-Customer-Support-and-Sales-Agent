<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Velvora Support Chat — Test Widget</title>
<style>
    #velvora-chat-bubble {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 4px 14px rgba(0,0,0,0.25);
        z-index: 9999;
        transition: transform 0.15s ease;
    }
    #velvora-chat-bubble:hover {
        transform: scale(1.06);
    }
    #velvora-chat-bubble svg {
        color: white;
    }
    #velvora-chat-window {
        position: fixed;
        bottom: 88px;
        right: 20px;
        width: 380px;
        max-width: 90vw;
        height: 500px;
        max-height: 70vh;
        background: white;
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        z-index: 9999;
        display: none;
        flex-direction: column;
        overflow: hidden;
        font-family: -apple-system, sans-serif;
    }
    #velvora-chat-window.open {
        display: flex;
    }
    #velvora-chat-header {
        background: #1a1a1a;
        color: white;
        padding: 16px;
        font-weight: 600;
        font-size: 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    #velvora-chat-close {
        cursor: pointer;
        display: flex;
        align-items: center;
    }
    #velvora-chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
    }
    .velvora-message {
        margin-bottom: 12px;
        padding: 10px 14px;
        border-radius: 12px;
        max-width: 80%;
        line-height: 1.4;
        white-space: pre-wrap;
        font-size: 14px;
    }
    .velvora-user-message {
        background: #1a1a1a;
        color: white;
        margin-left: auto;
    }
    .velvora-agent-message {
        background: #f0f0f0;
        color: #1a1a1a;
    }
    #velvora-chat-input-area {
        display: flex;
        border-top: 1px solid #eee;
        padding: 12px;
    }
    #velvora-chat-input {
        flex: 1;
        border: 1px solid #ddd;
        border-radius: 20px;
        padding: 10px 16px;
        font-size: 14px;
        outline: none;
    }
    #velvora-chat-send {
        margin-left: 8px;
        background: #1a1a1a;
        color: white;
        border: none;
        border-radius: 20px;
        padding: 10px 20px;
        cursor: pointer;
    }
</style>

<div id="velvora-chat-bubble" onclick="velvoraToggleChat()">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 10.5H16M8 14.5H13M21 12C21 16.9706 16.9706 21 12 21C10.4818 21 9.05074 20.6221 7.79654 19.9556L3 21L4.39366 16.8033C3.5157 15.4467 3 13.7893 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z"
              stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
</div>

<div id="velvora-chat-window">
    <div id="velvora-chat-header">
        <span>Velvora Support</span>
        <span id="velvora-chat-close" onclick="velvoraToggleChat()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 6L6 18M6 6L18 18" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
        </span>
    </div>
    <div id="velvora-chat-messages"></div>
    <div id="velvora-chat-input-area">
        <input type="text" id="velvora-chat-input" placeholder="Type a message..." />
        <button id="velvora-chat-send">Send</button>
    </div>
</div>

<script>
    const VELVORA_API_URL = "http://127.0.0.1:8000/api/chat";
    const velvoraSessionId = "web_" + Math.random().toString(36).substring(2, 15);
    let velvoraChatOpen = false;
    let velvoraGreeted = false;

    function velvoraToggleChat() {
        velvoraChatOpen = !velvoraChatOpen;
        document.getElementById("velvora-chat-window").classList.toggle("open", velvoraChatOpen);

        if (velvoraChatOpen && !velvoraGreeted) {
            velvoraAddMessage("Hi! I'm Velvora's support assistant. How can I help you today?", false);
            velvoraGreeted = true;
        }
    }

    function velvoraAddMessage(text, isUser) {
        const messagesEl = document.getElementById("velvora-chat-messages");
        const div = document.createElement("div");
        div.className = "velvora-message " + (isUser ? "velvora-user-message" : "velvora-agent-message");
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function velvoraSendMessage() {
        const inputEl = document.getElementById("velvora-chat-input");
        const text = inputEl.value.trim();
        if (!text) return;

        velvoraAddMessage(text, true);
        inputEl.value = "";

        try {
            const response = await fetch(VELVORA_API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ session_id: velvoraSessionId, text: text }),
            });
            const data = await response.json();
            velvoraAddMessage(data.reply, false);
        } catch (error) {
            velvoraAddMessage("Sorry, something went wrong. Please try again.", false);
            console.error(error);
        }
    }

    document.getElementById("velvora-chat-send").addEventListener("click", velvoraSendMessage);
    document.getElementById("velvora-chat-input").addEventListener("keypress", function(e) {
        if (e.key === "Enter") velvoraSendMessage();
    });
</script>
</body>
</html>
